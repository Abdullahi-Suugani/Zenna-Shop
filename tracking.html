<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Tracking</title>

  <!-- This code is needed for responsive design to work.
      (Responsive design = make the website look good on
      smaller screen sizes like a phone or a tablet). -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Load a font called Roboto from Google Fonts. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Here are the CSS files for this page. -->
  <link rel="stylesheet" href="styles/shared/general.css">
  <link rel="stylesheet" href="styles/shared/amazon-header.css">
  <link rel="stylesheet" href="styles/pages/tracking.css">
</head>

<body>
  <header class="site-header">
    <nav class="site-nav" aria-label="Primary navigation">
      <a class="brand-link" href="index.html" aria-label="Zenna home">Zenna</a>

      <form class="search-form" role="search">
        <label class="visually-hidden" for="tracking-search">Search Zenna products</label>
        <input
          id="tracking-search"
          class="search-input"
          type="search"
          placeholder="Search premium essentials..."
        >
        <button class="search-submit" type="submit" aria-label="Search">
          <span class="search-symbol" aria-hidden="true"></span>
        </button>
      </form>

      <div class="nav-actions">
        <a class="nav-link" href="index.html">Shop</a>
        <a class="nav-link account-link" href="#">
          <span class="account-icon" aria-hidden="true"></span>
          <span>Account</span>
        </a>
        <a class="nav-link" href="orders.html">Returns &amp; Orders</a>
        <a class="cart-link" href="checkout.html" aria-label="Cart">
          <span class="cart-icon" aria-hidden="true"></span>
          <span class="cart-badge js-cart-quantity">0</span>
          <span>Cart</span>
        </a>
      </div>
    </nav>
  </header>

  <div class="main">
    <div class="order-tracking">
      <a class="back-to-orders-link link-primary" href="orders.html">
        View all orders
      </a>

      <div class="delivery-date">
        Arriving on Monday, June 13
      </div>

      <div class="product-info">
        Black and Gray Athletic Cotton Socks - 6 Pairs
      </div>

      <div class="product-info">
        Quantity: 1
      </div>

      <img class="product-image" src="images/products/athletic-cotton-socks-6-pairs.jpg">

      <div class="progress-labels-container">
        <div class="progress-label">
          Preparing
        </div>
        <div class="progress-label current-status">
          Shipped
        </div>
        <div class="progress-label">
          Delivered
        </div>
      </div>

      <div class="progress-bar-container">
        <div class="progress-bar"></div>
      </div>
    </div>
  </div>
  <script>

    const url = new URL(window.location.href);
    console.log(url.searchParams.get('orderId'));
    console.log(url.searchParams.get('productId'));
  </script>
  <script type="module">
    import { cart } from './data/cart-class.js';

    document.querySelector('.js-cart-quantity').innerHTML = cart.calculateCartQuantity();
  </script>
</body>

</html>
