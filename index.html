<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zenna</title>

    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/shared/amazon-header.css">
    <link rel="stylesheet" href="styles/pages/amazon.css">
  </head>
  <body>
    <header class="site-header">
      <nav class="site-nav" aria-label="Primary navigation">
        <a class="brand-link" href="index.html" aria-label="Zenna home">Zenna</a>

        <form class="search-form" role="search">
          <label class="visually-hidden" for="site-search">Search Zenna products</label>
          <input
            id="site-search"
            class="search-input"
            type="search"
            placeholder="Search premium essentials..."
          >
          <button class="search-submit" type="submit" aria-label="Search">
            <span class="search-symbol" aria-hidden="true"></span>
          </button>
        </form>

        <div class="nav-actions">
          <a class="nav-link account-link" href="#">
            <span class="account-icon" aria-hidden="true"></span>
            <span>Account</span>
          </a>
          <a class="nav-link" href="orders.html">Returns &amp; Orders</a>
          <a class="cart-link" href="checkout.html" aria-label="Cart">
            <span class="cart-icon" aria-hidden="true"></span>
            <span class="cart-badge js-cart-quantity">0</span>
            <span>Cart</span>
          </a>
        </div>
      </nav>
    </header>

    <main class="main-content">
      <section class="products-section" aria-label="Featured products">
        <div class="products-grid js-product-grid"></div>
      </section>
    </main>

    <script type="module" src="scripts/amazon.js"></script>
  </body>
</html>
